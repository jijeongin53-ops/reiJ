<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지정인 - Link in ReiJ</title>
    <meta name="description" content="지정인 대표이사 - AI솔루션크리에이터, 관광콘텐츠기획자, 작가, 마이스전문가, 컨설턴트">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-color: #f7f9fc;
            --text-main: #2d3748;
            --text-sub: #718096;
            --btn-bg: #ffffff;
            --btn-border: #e2e8f0;
            --highlight-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --highlight-text: #ffffff;
            --accent: #667eea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px 60px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        /* 프로필 섹션 */
        .profile {
            margin-bottom: 32px;
        }

        .profile img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            margin-bottom: 16px;
        }

        .profile h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile .role {
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
            padding: 0 10px;
        }

        .tags span {
            font-size: 0.75rem;
            color: #4a5568;
            background-color: #edf2f7;
            padding: 6px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        /* 링크 섹션 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .link-item {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-border);
            padding: 18px 20px;
            border-radius: 16px;
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }

        .link-item.highlight {
            background: var(--highlight-bg);
            color: var(--highlight-text);
            border: none;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        .link-item.highlight .link-desc {
            color: rgba(255, 255, 255, 0.85);
        }

        .link-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            z-index: 1;
        }

        .link-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
            z-index: 1;
        }

        .link-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            z-index: 0;
        }

        .link-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }

        .link-item:hover::after {
            left: 125%;
            transition: left 0.7s ease-in-out;
        }

        /* 로딩 스켈레톤 */
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #edf2f7 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
            height: 80px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0 32px;
            color: var(--text-sub);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--btn-border);
        }

        /* 문의 폼 섹션 */
        .inquiry-section {
            text-align: left;
        }

        .inquiry-section h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-main);
            text-align: center;
        }

        .inquiry-section p {
            font-size: 0.82rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--btn-border);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--text-main);
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .form-group textarea {
            height: 110px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--highlight-bg);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            letter-spacing: -0.3px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* 성공/실패 메시지 */
        .form-msg {
            display: none;
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .form-msg.success {
            background: #f0fff4;
            color: #276749;
            border: 1.5px solid #9ae6b4;
        }

        .form-msg.error {
            background: #fff5f5;
            color: #9b2c2c;
            border: 1.5px solid #feb2b2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 에러 메시지 */
        .load-error {
            padding: 20px;
            background: #fff5f5;
            border: 1.5px solid #feb2b2;
            border-radius: 14px;
            color: #9b2c2c;
            font-size: 0.88rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 프로필 -->
        <div class="profile">
            <img src="profile.jpg.png" alt="지정인 대표이사 프로필 사진">
            <h1>지정인</h1>
            <p class="role">대표이사</p>
            <div class="tags">
                <span>AI솔루션크리에이터</span>
                <span>관광콘텐츠기획자</span>
                <span>작가</span>
                <span>마이스전문가</span>
                <span>컨설턴트</span>
            </div>
        </div>

        <!-- 링크 목록 (Google Sheets에서 동적 로드, 기본값 즉시 표시) -->
        <div class="links" id="links-container">
            <a href="https://blog.naver.com/doctorstudy12" target="_blank" rel="noopener noreferrer" class="link-item highlight">
                <span class="link-title">글로벌하이브리드 교육 큐레이션</span>
                <span class="link-desc">데이터로 읽고 마음으로 가르칩니다.</span>
            </a>
            <a href="https://www.threads.com/@sanare_host?hl=ko" target="_blank" rel="noopener noreferrer" class="link-item">
                <span class="link-title">sanare_host (스레드)</span>
                <span class="link-desc">창업과 AI 정보를 공유합니다.</span>
            </a>
            <a href="https://www.instagram.com/sanare_host/" target="_blank" rel="noopener noreferrer" class="link-item">
                <span class="link-title">sanare_host (인스타그램)</span>
                <span class="link-desc">사나레 주인장의 다양한 직업을 공개합니다.</span>
            </a>
            <a href="https://bookk.co.kr/search?keywords=%EC%A7%80%EC%A0%95%EC%9D%B8" target="_blank" rel="noopener noreferrer" class="link-item">
                <span class="link-title">작가 (부크크)</span>
                <span class="link-desc">아직은 새내기 작가.</span>
            </a>
        </div>

        <!-- 구분선 -->
        <div class="divider">문의하기</div>

        <!-- 문의 폼 -->
        <div class="inquiry-section">
            <h2>✉️ 연락하기</h2>
            <p>협업 제안, 강의 문의 등 편하게 남겨주세요.</p>
            <form id="inquiry-form">
                <div class="form-group">
                    <label for="inq-name">이름</label>
                    <input type="text" id="inq-name" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="inq-email">이메일</label>
                    <input type="email" id="inq-email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="inq-message">문의 내용</label>
                    <textarea id="inq-message" placeholder="문의 내용을 입력해주세요..." required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">보내기</button>
                <div class="form-msg" id="form-msg"></div>
            </form>
        </div>
    </div>

    <script>
        // ============================
        // 설정값
        // ============================
        const SHEET_ID = '1AepUTO6yvs1DlRz8P4_J1aTqzghp6C19VaraK5rGJ1g';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwDsy6bvjI9iyXDO0g_6muC8uPFEj7o_AjO1SuHhZvP96E2Tmk0vDpzlddjimDNlEhY/exec';

        // ============================
        // Image GET 요청 (CORS 우회, 리다이렉트 자동 처리)
        // ============================
        function submitViaImage(data) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve();
                img.onerror = () => resolve(); // 오류여도 resolve (응답 읽기 불가)
                img.src = SCRIPT_URL + '?' + new URLSearchParams(data).toString();
                setTimeout(resolve, 4000); // 최대 4초 대기
            });
        }

        // ============================
        // 링크 로드 (Google Sheets)
        // ============================
        async function loadLinks() {
            const container = document.getElementById('links-container');
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=links`;

            try {
                const res = await fetch(url);
                const text = await res.text();

                // gviz JSONP 래퍼 제거
                const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
                if (!jsonStr) throw new Error('파싱 실패');

                const json = JSON.parse(jsonStr[1]);
                const rows = json.table.rows;

                if (!rows || rows.length === 0) {
                    throw new Error('데이터 없음');
                }

                // 유효한 링크만 수집 (URL이 있어야 함)
                const validLinks = [];
                rows.forEach(row => {
                    const title     = row.c[0]?.v || '';
                    const desc      = row.c[1]?.v || '';
                    const href      = row.c[2]?.v || '';
                    const highlight = row.c[3]?.v === true || String(row.c[3]?.v).toUpperCase() === 'TRUE';
                    const visible   = row.c[4]?.v === true || String(row.c[4]?.v).toUpperCase() === 'TRUE';

                    // URL이 비어있거나 visible이 아닌 경우 제외
                    if (!visible || !title || !href || href === '#') return;
                    validLinks.push({ title, desc, href, highlight });
                });

                // 유효한 링크가 있을 때만 기본값을 교체
                if (validLinks.length > 0) {
                    container.innerHTML = '';
                    validLinks.forEach(({ title, desc, href, highlight }) => {
                        const a = document.createElement('a');
                        a.href = href;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.className = 'link-item' + (highlight ? ' highlight' : '');
                        a.innerHTML = `
                            <span class="link-title">${title}</span>
                            <span class="link-desc">${desc}</span>
                        `;
                        container.appendChild(a);
                    });
                }
                // 유효한 링크가 없으면 기본 HTML 유지 (아무것도 안 함)


            } catch (err) {
                // 로드 실패 시 기본 링크 표시
                console.warn('Sheets 연동 실패, 기본값 사용:', err);
                container.innerHTML = `
                    <a href="https://blog.naver.com/doctorstudy12" target="_blank" rel="noopener noreferrer" class="link-item highlight">
                        <span class="link-title">글로벌하이브리드 교육 큐레이션</span>
                        <span class="link-desc">데이터로 읽고 마음으로 가르칩니다.</span>
                    </a>
                    <a href="https://www.threads.com/@sanare_host?hl=ko" target="_blank" rel="noopener noreferrer" class="link-item">
                        <span class="link-title">sanare_host (스레드)</span>
                        <span class="link-desc">창업과 AI 정보를 공유합니다.</span>
                    </a>
                    <a href="https://www.instagram.com/sanare_host/" target="_blank" rel="noopener noreferrer" class="link-item">
                        <span class="link-title">sanare_host (인스타그램)</span>
                        <span class="link-desc">사나레 주인장의 다양한 직업을 공개합니다.</span>
                    </a>
                    <a href="https://bookk.co.kr/search?keywords=%EC%A7%80%EC%A0%95%EC%9D%B8" target="_blank" rel="noopener noreferrer" class="link-item">
                        <span class="link-title">작가 (부크크)</span>
                        <span class="link-desc">아직은 새내기 작가.</span>
                    </a>
                `;
            }
        }

        // ============================
        // 문의 폼 제출
        // ============================
        document.getElementById('inquiry-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('form-msg');
            const name    = document.getElementById('inq-name').value.trim();
            const email   = document.getElementById('inq-email').value.trim();
            const message = document.getElementById('inq-message').value.trim();

            btn.disabled = true;
            btn.textContent = '전송 중...';
            msg.style.display = 'none';

            try {
                await submitViaImage({ name, email, message });

                // no-cors 모드에서는 응답 확인 불가 → 성공으로 처리
                msg.className = 'form-msg success';
                msg.textContent = '✅ 문의가 접수되었습니다. 빠른 시일 내에 연락드리겠습니다!';
                msg.style.display = 'block';
                this.reset();

            } catch (err) {
                msg.className = 'form-msg error';
                msg.textContent = '❌ 전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                msg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '보내기';
            }
        });

        // 페이지 로드 시 링크 불러오기
        loadLinks();
    </script>

</body>
</html>
